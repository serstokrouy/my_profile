<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Chamroeun Dev</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;700;900&display=swap');

:root{
    --x:50%;
    --y:50%;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Kantumruy Pro",sans-serif;
    background:#050816;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    color:white;
}

/* ========================================= */
/* BACKGROUND */
/* ========================================= */

body::before{
    content:"";
    position:fixed;
    inset:-20%;

    background:
    radial-gradient(circle at 20% 20%, rgba(0,229,255,.25), transparent 25%),
    radial-gradient(circle at 80% 20%, rgba(255,42,160,.22), transparent 25%),
    radial-gradient(circle at 50% 80%, rgba(125,255,143,.15), transparent 30%),
    linear-gradient(135deg,#040816,#0b1020,#12081c);

    filter:blur(40px);

    animation:bgMove 12s ease infinite alternate;

    z-index:-5;
}

@keyframes bgMove{

    0%{
        transform:scale(1) rotate(0deg);
    }

    100%{
        transform:scale(1.08) rotate(5deg);
    }

}

/* ========================================= */
/* GRID */
/* ========================================= */

.grid{
    position:absolute;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

    background-size:70px 70px;

    mask-image:
    radial-gradient(circle at var(--x) var(--y),
    black 0%,
    transparent 75%);

    animation:gridMove 14s linear infinite;
}

@keyframes gridMove{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(70px);
    }

}

/* ========================================= */
/* CARD */
/* ========================================= */

.card{

    position:relative;

    width:min(92vw,850px);

    min-height:500px;

    border-radius:40px;

    overflow:hidden;

    padding:70px 60px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    isolation:isolate;

    backdrop-filter:blur(30px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 20px 80px rgba(0,0,0,.45),
    0 0 80px rgba(0,229,255,.08),
    0 0 120px rgba(255,42,160,.06);

}

/* ========================================= */
/* FULL COLOR INSIDE CARD */
/* ========================================= */

.card::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:inherit;

    background:
    conic-gradient(
        from 0deg,
        #00e5ff,
        #ff2aa0,
        #7dff8f,
        #ffd257,
        #00e5ff
    );

    opacity:.28;

    filter:
    blur(70px)
    saturate(160%);

    animation:spin 10s linear infinite;

    transform:scale(1.25);

    z-index:-3;
}

/* ========================================= */
/* GLASS LAYER */
/* ========================================= */

.card::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:inherit;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.10),
        rgba(255,255,255,.03)
    );

    backdrop-filter:blur(24px);

    z-index:-2;
}

/* ========================================= */
/* BORDER GLOW */
/* ========================================= */

.border-line{

    position:absolute;

    inset:0;

    border-radius:40px;

    padding:1.5px;

    background:
    linear-gradient(
        90deg,
        rgba(0,229,255,.9),
        rgba(255,42,160,.9),
        rgba(255,210,87,.9),
        rgba(0,229,255,.9)
    );

    background-size:300% 300%;

    animation:borderFlow 6s linear infinite;

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;
            mask-composite:exclude;

    pointer-events:none;

    z-index:3;
}

@keyframes borderFlow{

    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:300% 50%;
    }

}

/* ========================================= */
/* CONTENT */
/* ========================================= */

.content{
    position:relative;
    z-index:2;
    text-align:center;
}

/* ========================================= */
/* TITLE */
/* ========================================= */

.title{

    font-size:clamp(3rem,7vw,6.5rem);

    line-height:1.1;

    font-weight:700;

    margin-bottom:35px;
    max-width:100%;
    margin-top: 20px;
    padding-top: 20px;

    background:
    linear-gradient(
        90deg,
        #fff4d6,
        #fff0a8,
        #ffffff,
        #ffe4c6
    );

    background-size:300% 300%;

    -webkit-background-clip:text;
    background-clip:text;

    color:transparent;

    animation:textFlow 7s ease infinite;

    text-shadow:
    0 0 30px rgba(255,255,255,.12);
}

@keyframes textFlow{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

/* ========================================= */
/* SUBTITLE */
/* ========================================= */

.subtitle{

    max-width:700px;

    margin:auto;

    font-size:1.15rem;

    line-height:1.9;

    color:rgba(255,255,255,.72);

    margin-bottom:55px;
}

/* ========================================= */
/* BUTTON */
/* ========================================= */

.btn{

    position:relative;

    border:none;

    border-radius:999px;

    padding:20px 55px;

    font-size:1.1rem;

    font-weight:700;

    cursor:pointer;

    overflow:hidden;

    color:#07111f;

    background:
    linear-gradient(
        135deg,
        #00d9ff,
        #ff2aa0
    );

    transition:.35s ease;

    box-shadow:
    0 10px 35px rgba(0,229,255,.25);

}

.btn::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.7),
        transparent
    );

    transform:translateX(-120%);
}

.btn:hover::before{
    animation:shine 1s forwards;
}

@keyframes shine{

    to{
        transform:translateX(120%);
    }

}

.btn:hover{

    transform:
    translateY(-5px)
    scale(1.04);

    box-shadow:
    0 20px 50px rgba(255,42,160,.35);
}

/* ========================================= */
/* PARTICLES */
/* ========================================= */

.particle{

    position:absolute;

    border-radius:50%;

    background:white;

    opacity:.12;

    pointer-events:none;

    animation:float linear infinite;
}

@keyframes float{

    from{
        transform:translateY(100vh) scale(0);
    }

    to{
        transform:translateY(-120vh) scale(1);
    }

}

/* ========================================= */
/* SPIN */
/* ========================================= */

@keyframes spin{

    to{
        transform:
        scale(1.25)
        rotate(360deg);
    }

}

/* ========================================= */
/* RESPONSIVE */
/* ========================================= */

@media(max-width:768px){

    .card{
        padding:45px 25px;
        min-height:420px;
    }

    .subtitle{
        font-size:1rem;
        line-height:1.7;
    }

    .btn{
        padding:16px 35px;
    }

}

/* ========================================= */
/* REDUCE MOTION */
/* ========================================= */

@media(prefers-reduced-motion:reduce){

    *,
    *::before,
    *::after{
        animation:none !important;
        transition:none !important;
    }

}

</style>
</head>

<body>

<div class="grid"></div>

<div class="card">

    <div class="border-line"></div>

    <div class="content">

        <h1 class="title">
            យើងញ័រអីដែរ?
        </h1>

    </div>

</div>

<div class="light-effect" style="pointer-events:none;"></div>

<script>

/* ========================================= */
/* MOUSE GRID EFFECT */
/* ========================================= */

const root = document.documentElement;

window.addEventListener("mousemove",(e)=>{

    root.style.setProperty("--x",`${e.clientX}px`);
    root.style.setProperty("--y",`${e.clientY}px`);

    // Move the light effect
    light.style.setProperty('--lx', `${e.clientX}px`);
    light.style.setProperty('--ly', `${e.clientY}px`);
    light.style.opacity = 1;

});

window.addEventListener("mouseleave",()=>{

    light.style.opacity = 0;

});

/* ========================================= */
/* PARTICLES */
/* ========================================= */

for(let i=0;i<40;i++){

    const p = document.createElement("div");

    p.classList.add("particle");

    const size = Math.random()*4+2;

    p.style.width = `${size}px`;
    p.style.height = `${size}px`;

    p.style.left = `${Math.random()*100}%`;

    p.style.animationDuration =
    `${Math.random()*15+10}s`;

    p.style.animationDelay =
    `${Math.random()*-20}s`;

    document.body.appendChild(p);

}

/* ========================================= */
/* BUTTON EFFECT */
/* ========================================= */

const btn = document.querySelector(".btn");

const light = document.querySelector('.light-effect');

btn.addEventListener("mousemove",(e)=>{

    const rect = btn.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    light.style.setProperty('--lx', `${e.clientX}px`);
    light.style.setProperty('--ly', `${e.clientY}px`);
    light.style.opacity = 1;

});
</script>

</body>
</html>
