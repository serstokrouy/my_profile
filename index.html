<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Chamroeun Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:ital,wght@0,100..700;1,100..700&display=swap');
        :root {
            --x: 50%;
            --y: 50%;
            --cta-bg: linear-gradient(90deg, #00e5ff 0%, #ff2aa0 100%);
            --cta-bg-hover: linear-gradient(90deg, #ffbe3d 0%, #2cff9f 100%);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            overflow: hidden;
            font-family: "Kantumruy Pro", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #08090f;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #f8fbff;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -25vmax;
            pointer-events: none;
        }

        body::before {
            background:
                radial-gradient(circle at var(--x) var(--y), rgba(255, 255, 255, 0.18), transparent 0 16rem),
                radial-gradient(circle at 16% 22%, rgba(0, 229, 255, 0.32), transparent 0 27rem),
                radial-gradient(circle at 82% 18%, rgba(255, 42, 160, 0.28), transparent 0 25rem),
                radial-gradient(circle at 50% 88%, rgba(255, 190, 61, 0.22), transparent 0 26rem),
                radial-gradient(circle at 22% 78%, rgba(44, 255, 159, 0.18), transparent 0 22rem),
                linear-gradient(135deg, #07081244 0%, #10152844 50%, #2a48a344 100%);
            filter: blur(18px) saturate(1.15);
            animation: colorFlow 12s ease-in-out infinite alternate;
            opacity: 0.55;
        }

        body::after {
            background:
                linear-gradient(115deg, rgba(255, 255, 255, 0.08), transparent 28% 72%, rgba(255, 255, 255, 0.06)),
                repeating-linear-gradient(90deg, var(--grid-x, rgba(255,255,255,0.025)) 0 1px, transparent 1px 110px),
                repeating-linear-gradient(0deg, var(--grid-y, rgba(255,255,255,0.022)) 0 1px, transparent 1px 110px);
            transition: --grid-x 1.2s cubic-bezier(.4,2,.6,1), --grid-y 1.2s cubic-bezier(.4,2,.6,1);
            mask-image: radial-gradient(circle at var(--x) var(--y), #000 0 31rem, transparent 56rem);
            opacity: 0.32;
            transform: perspective(900px) rotateX(58deg) translateY(9%);
            animation: glassShift 9s linear infinite;
        }

        .stage {
            position: relative;
            width: min(92vw, 700px);
            min-height: clamp(220px, 42vw, 420px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            isolation: isolate;
            padding: 2.5rem 2vw;
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: clamp(18px, 4vw, 34px);
            /* background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.04)),
                radial-gradient(circle at var(--x) var(--y), rgba(255, 255, 255, 0.24), transparent 0 19rem);
            box-shadow:
                0 36px 90px rgba(0, 0, 0, 0.38),
                inset 0 1px 0 rgba(255, 255, 255, 0.35),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(22px) saturate(1.35); */
            -webkit-backdrop-filter: blur(22px) saturate(1.35);
            transform: translate3d(
                calc((var(--x-num, 0.5) - 0.5) * -18px),
                calc((var(--y-num, 0.5) - 0.5) * -18px),
                0
            );
            transition: transform 180ms ease;
            z-index: -1;
        }

        h1 {
            margin:  4px 0.25rem;
            max-width: 100%;
            padding: 2rem 2vw;
            font-size: clamp(2.2rem, 7vw, 6.2rem);
            line-height: 1.2;
            text-align: center;
            letter-spacing: 0;
            font-weight: 900;
            color: transparent;
            background:
                radial-gradient(circle at var(--x) var(--y), #ffffff 0 10%, #aef7ff 23%, #ff8bd3 45%, #fff1a6 64%, #ffffff 84%);
            background-size: 180% 180%;
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 8px 32px rgba(0, 0, 0, 0.32);
            animation: titleGlow 5s ease-in-out infinite alternate;
            transition: transform 0.25s cubic-bezier(.4,2,.6,1), filter 0.25s;
            cursor: pointer;
        }

        h1:hover {
            transform: scale(1.03) rotate(-1deg);
            filter: drop-shadow(0 0 18px #00e5ff88) brightness(1.08);
        }

        .cta-btn {
            font-family: "Kantumruy Pro", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin-top: 2.2rem;
            padding: 1.1rem 2.6rem;
            font-size: 1.25rem;
            font-weight: 700;
            border: none;
            border-radius: 2.5rem;
            background: var(--cta-bg);
            color: #101528;
            box-shadow: 0 4px 32px 0 #00e5ff33, 0 1.5px 0 #fff3 inset;
            cursor: pointer;
            transition: background 0.3s, transform 0.18s, box-shadow 0.18s, color 0.18s;
            outline: none;
            letter-spacing: 0.03em;
            position: relative;
            z-index: 1;
        }
        .cta-btn:hover, .cta-btn:focus {
            background: var(--cta-bg-hover);
            color: #08090f;
            transform: scale(1.06) translateY(-2px);
            box-shadow: 0 8px 36px 0 #ffbe3d55, 0 2px 0 #fff6 inset;
        }
        

        @keyframes colorFlow {
            0% {
                transform: translate3d(-2%, -1%, 0) rotate(0deg) scale(1);
            }

            100% {
                transform: translate3d(2%, 1%, 0) rotate(8deg) scale(1.04);
            }
        }

        @keyframes glassShift {
            to {
                background-position: 0 0, 110px 0, 0 110px;
            }
        }

        @keyframes titleGlow {
            from {
                filter: drop-shadow(0 0 12px rgba(137, 226, 255, 0.45));
            }

            to {
                filter: drop-shadow(0 0 28px rgba(255, 141, 214, 0.56));
            }
        }

        @keyframes bgMove {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }

        @media (max-width: 520px) {
            .stage {
                width: min(99vw, 420px);
                min-height: 220px;
                padding: 0 2vw 2vw 2vw;
            }
            h1 {
                font-size: clamp(1.5rem, 10vw, 3.2rem);
            }
            .cta-btn {
                font-size: 0.98rem;
                padding: 0.8rem 1.3rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <main class="stage" aria-label="Chamroeun Dev">
        <h1>អត់មិនបានឡូវហើយអញ!!</h1>
        <button class="cta-btn" onclick="window.location.href='index2.html'">ញ័រសាច់</button>
        
    </main>

    <script>
        const root = document.documentElement;

        // Pointer effect
        window.addEventListener("pointermove", (event) => {
            const x = event.clientX / window.innerWidth;
            const y = event.clientY / window.innerHeight;
            root.style.setProperty("--x", `${x * 100}%`);
            root.style.setProperty("--y", `${y * 100}%`);
            root.style.setProperty("--x-num", x.toFixed(4));
            root.style.setProperty("--y-num", y.toFixed(4));
        });

        // Animate grid line colors
        function randomGridColor(alpha = 0.18) { // Increased default alpha
            const h = Math.floor(Math.random() * 360);
            const s = 60 + Math.random() * 30; // 60-90%
            const l = 60 + Math.random() * 20; // 60-80%
            return `hsla(${h},${s}%,${l}%,${alpha})`;
        }

        function setRandomGridColors() {
            root.style.setProperty('--grid-x', randomGridColor(0.9)); // Higher opacity
            root.style.setProperty('--grid-y', randomGridColor(0.9)); // Higher opacity
        }

        setRandomGridColors();
        setInterval(setRandomGridColors, 3000); // Change every 3 seconds
    </script>
</body>
</html>
